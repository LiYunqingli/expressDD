<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>快递查询系统</title>
    <script src="../js/showMessage.js"></script>
    <script src="../js/lib.js"></script>
    <link rel="stylesheet" href="../css/message-box.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 30px 0;
            color: white;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .search-box {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            padding: 30px;
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            margin-bottom: 15px;
        }

        #searchInput {
            flex: 1;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px 0 0 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        #searchInput:focus {
            border-color: #4CAF50;
            outline: none;
        }

        #searchButton {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 0 8px 8px 0;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: background 0.3s;
        }

        #searchButton:hover {
            background: #45a049;
        }

        .hint {
            text-align: center;
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .results-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            overflow: hidden;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #eee;
        }

        .results-count {
            font-weight: bold;
            color: #4CAF50;
        }

        .results-table {
            width: 100%;
            border-collapse: collapse;
        }

        .results-table th {
            background: #4CAF50;
            color: white;
            padding: 15px;
            text-align: left;
        }

        .results-table td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
        }

        .results-table tr:nth-child(even) {
            background-color: #f8f9fa;
        }

        .results-table tr:hover {
            background-color: #e9f7e9;
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: #777;
        }

        .no-results i {
            font-size: 3rem;
            color: #ddd;
            margin-bottom: 15px;
        }

        @media (max-width: 768px) {
            .search-box {
                padding: 20px;
            }

            .input-group {
                flex-direction: column;
            }

            #searchInput {
                border-radius: 8px;
                margin-bottom: 10px;
            }

            #searchButton {
                border-radius: 8px;
                padding: 15px;
            }

            .results-table {
                display: block;
                overflow-x: auto;
            }

            .results-header {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }
        }

        .result-item {
            padding: 15px;
            border-bottom: 1px solid #eee;
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-row {
            display: flex;
            margin-bottom: 8px;
        }

        .result-label {
            font-weight: bold;
            min-width: 80px;
            color: #555;
        }
    </style>
    <script>
        // 本地检查登录状态
        if (!checkLoginToken()) {
            window.location.href = "login.html";
        } else {
            // 服务器检查登录状态
            checkLoginTokenIsTrue();
        }
    </script>
</head>

<body>
    <div class="container">
        <header>
            <h1>快递查询系统</h1>
            <p>快速查找您的快递信息</p>
        </header>

        <div class="search-box">
            <div class="input-group">
                <input type="text" id="searchInput" placeholder="请输入栋号、宿舍号、取件码或快递尾号">
                <button id="searchButton" onclick="search()">搜索</button>
            </div>
            <p class="hint">提示：可以搜索栋号、宿舍号、取件码或快递单号后4位</p>
        </div>

        <div class="results-container">
            <div class="results-header">
                <h2>查询结果</h2>
                <div class="results-count">共 <span id="resultCount">0</span> 条记录</div>
            </div>
            <div id="searchResults" class="no-results">
                <i>🔍</i>
                <p>请输入关键词进行查询</p>
            </div>
        </div>
    </div>

    <script>
        // 按Enter键触发搜索
        document.getElementById('searchInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                search();
            }
        });

        function search() {
            let searchInput = document.getElementById('searchInput').value.trim();
            if (searchInput === '') {
                top.showMessage('请输入搜索内容', 3000, "red");
                return;
            }

            // 获取token
            const token = localStorage.getItem('token');
            if (!token) {
                top.showMessage('登录信息已过期，请重新登录', 3000, "red");
                setTimeout(() => {
                    window.location.href = "login.html";
                }, 1500);
                return;
            }

            // 显示加载状态
            const resultsDiv = document.getElementById('searchResults');
            resultsDiv.innerHTML = '<div style="text-align:center;padding:30px;"><i>⏳</i><p>搜索中，请稍候...</p></div>';
            document.getElementById('resultCount').textContent = '0';

            let xhr = new XMLHttpRequest();
            xhr.open('POST', '../php/searchData.php', true);
            xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        try {
                            let result = JSON.parse(xhr.responseText);
                            if (result.code === 200) {
                                displayResults(result.data);
                            } else {
                                top.showMessage(result.msg, 3000, "red");
                                resultsDiv.innerHTML = '<div class="no-results"><i>⚠️</i><p>' + result.msg + '</p></div>';
                            }
                        } catch (e) {
                            top.showMessage('解析响应失败: ' + e, 3000, "red");
                            resultsDiv.innerHTML = '<div class="no-results"><i>❌</i><p>服务器响应错误</p></div>';
                        }
                    } else {
                        top.showMessage('网络请求失败: ' + xhr.status, 3000, "red");
                        resultsDiv.innerHTML = '<div class="no-results"><i>❌</i><p>网络请求失败，请重试</p></div>';
                    }
                }
            };

            // 发送数据
            const params = `token=${encodeURIComponent(token)}&searchInput=${encodeURIComponent(searchInput)}`;
            xhr.send(params);
        }

        function displayResults(data) {
            const resultsDiv = document.getElementById('searchResults');
            const resultCount = document.getElementById('resultCount');

            if (!data || data.length === 0) {
                resultsDiv.innerHTML = '<div class="no-results"><i>🔍</i><p>没有找到匹配的记录</p></div>';
                resultCount.textContent = '0';
                return;
            }

            resultCount.textContent = data.length;

            // 清空结果容器
            resultsDiv.innerHTML = '';

            // 移动端使用列表视图，桌面端使用表格视图
            if (window.innerWidth < 768) {
                // 移动端视图
                data.forEach(item => {
                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'result-item';

                    const fields = [
                        { label: '日期', value: item.time },
                        { label: '登记时间', value: item.insert_time },
                        { label: '栋号', value: item.building },
                        { label: '宿舍号', value: item.room },
                        { label: '取件码', value: item.pickupCode },
                        { label: '快递单号', value: item.expressNumber },
                        { label: '备注', value: item.notes || '无' }
                    ];

                    fields.forEach(field => {
                        if (field.value) {
                            const rowDiv = document.createElement('div');
                            rowDiv.className = 'result-row';

                            const labelSpan = document.createElement('span');
                            labelSpan.className = 'result-label';
                            labelSpan.textContent = field.label + ':';

                            const valueSpan = document.createElement('span');
                            valueSpan.textContent = field.value;

                            rowDiv.appendChild(labelSpan);
                            rowDiv.appendChild(valueSpan);
                            itemDiv.appendChild(rowDiv);
                        }
                    });

                    resultsDiv.appendChild(itemDiv);
                });
            } else {
                // 桌面端视图 - 表格
                const table = document.createElement('table');
                table.className = 'results-table';

                // 创建表头
                const thead = document.createElement('thead');
                const headerRow = document.createElement('tr');
                const headers = ['日期', '登记时间', '栋号', '宿舍号', '取件码', '快递单号', '备注'];

                headers.forEach(headerText => {
                    const th = document.createElement('th');
                    th.textContent = headerText;
                    headerRow.appendChild(th);
                });

                thead.appendChild(headerRow);
                table.appendChild(thead);

                // 创建表格内容
                const tbody = document.createElement('tbody');
                data.forEach(item => {
                    const row = document.createElement('tr');

                    const fields = [
                        item.time,
                        item.insert_time,
                        item.building,
                        item.room,
                        item.pickupCode,
                        item.expressNumber,
                        item.notes || '无'
                    ];

                    fields.forEach(value => {
                        const td = document.createElement('td');
                        td.textContent = value;
                        row.appendChild(td);
                    });

                    tbody.appendChild(row);
                });

                table.appendChild(tbody);
                resultsDiv.appendChild(table);
            }
        }
    </script>
</body>

</html>
