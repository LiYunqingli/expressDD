<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <title>编辑抽奖</title>
    <link rel="stylesheet" href="../css/message-box.css">
    <script src="../js/lib.js"></script>
    <script src="../js/showMessage.js"></script>
    <script>
        //本地检查登录状态
        if (!checkLoginToken()) {
            window.location.href = "login.html";
        } else {
            //服务器检查登录状态
            checkLoginTokenIsTrue();
        }
    </script>

<style>
    table {
        width: 100%;
        max-width: 800px;
        border-collapse: collapse;
        border: 2px solid #000;
        text-align: center;
    }

    td {
        border: 1px solid #ccc;
        padding: 10px;
        border-right: 2px solid #000;
    }

    table td:nth-child(odd) {
        font-weight: bold;
    }

    table tr:nth-child(even) {
        background-color: #f2f2f2;
    }

    .operate {
        /* text-align: center; */
    }

    .operate button {
        padding: 5px 10px;
        margin: 5px;
        background-color: green;
        border: none;
        color: #fff;
        border-radius: 5px;
        font-size: 16px;
    }

    .operate button:hover {
        background-color: #0b5137;
        cursor: pointer;
    }

    .operate .red {
        background-color: red;
    }

    .operate .red:hover {
        background-color: #8b0000;
    }

    .no-activity {
        margin-top: 40px;
        margin-left: 20px;
        padding: 10px;
        background-color: #f2f2f2;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-size: 18px;
        text-align: center;
        user-select: none;
    }

    .no-activity a {
        color: #007bff;
        font-weight: bold;

    }

    .no-activity a:hover {
        text-decoration: underline;
    }

    .no-activity a:active {
        color: #0056b3;
    }

    input {
        margin: 5px;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-size: 16px;
        width: 90%;
    }
</style>

<body>
    <h1>今天抽奖活动</h1>

    <!-- 活动详情表格 -->
    <div id="huodong" style="display: none;">
        <table id="insert">
            <!-- <tr>
                <td>ID</td>
                <td>1</td>
            </tr>
            <tr>
                <td>title</td>
                <td>2元代金券抽奖活动</td>
            </tr>
            <tr>
                <td>抽奖时间</td>
                <td>2025-09-06</td>
            </tr>
            <tr>
                <td>抽奖个数</td>
                <td>3</td>
            </tr>
            <tr>
                <td>是否完成抽奖</td>
                <td>false</td>
            </tr> -->
        </table>
        <div class="operate">
            <button class="red">修改</button>
            <button>保存</button>
        </div>
    </div>

    <div id="create" style="display: none;">
        <table>
            <tr>
                <td>title</td>
                <td>
                    <input type="text" id="title" placeholder="请输入活动名称，例如：2元代金券抽奖活动">
                </td>
                </td>
            </tr>
            <tr>
                <td>抽奖时间</td>
                <td>
                    <input type="date" id="date" placeholder="请输入抽奖时间">
                </td>
                </td>
            </tr>
            <tr>
                <td>抽奖个数</td>
                <td>
                    <input type="number" id="num" placeholder="请输入抽奖个数">
                </td>
                </td>
            </tr>
            <tr>
                <td colspan="2">
                    <button style="padding: 5px 10px; font-size: 14px;" onclick="sendCreate()">确认创建</button>
                </td>
            </tr>
        </table>
    </div>
    <br>
    <br>
    <br>
    <!-- 创建活动消息 -->
    <span class="no-activity" id="no-activity">
        今日无抽奖活动，&nbsp;<a href="javascript:create()">点击</a>&nbsp;初始化表单
    </span>

</body>

<script>
    // 创建今天的抽奖活动
    function create() {
        top.showMessage("创建完成(模拟)");

        let date = new Date();
        // 分别获取年、月、日并处理补0
        let year = date.getFullYear();
        let month = (date.getMonth() + 1).toString().padStart(2, '0');
        let day = date.getDate().toString().padStart(2, '0');

        // 拼接成 yyyy-mm-dd 格式
        let today = `${year}-${month}-${day}`;
        document.getElementById("date").value = today;

        document.getElementById("create").style.display = "block";
    }

    // 发送创建请求
    function sendCreate() {
        let title = document.getElementById("title").value;
        let date = document.getElementById("date").value;
        let num = document.getElementById("num").value;

        if (title == "" || date == "" || num == "") {
            top.showMessage("请填写完整", 3000, 'red');
            return;
        }

        let xhr = new XMLHttpRequest();
        xhr.open("POST", $HOST + "/createActivity.php", true);
        xhr.setRequestHeader("Content-type", "application/x-www-form-urlencoded");
        xhr.onreadystatechange = function () {
            if (xhr.readyState == 4 && xhr.status == 200) {
                let result = JSON.parse(xhr.responseText);
                if (result.code == 200) {
                    top.showMessage(result.msg);
                    loadInit();
                }else{
                    top.showMessage(result.msg, 3000, 'red');
                }
            }
        };
        xhr.send("title=" + title + "&date=" + date + "&num=" + num + "&token=" + getToken());
    }

    // 加载今天的活动
    function loadInit() {

        let date = new Date();
        let today = date.getFullYear() + "-" + (date.getMonth() + 1) + "-" + date.getDate();

        let xhr = new XMLHttpRequest();
        xhr.open("POST", $HOST + "/getActivityInfo.php", true);
        xhr.setRequestHeader("Content-type", "application/x-www-form-urlencoded");
        xhr.onreadystatechange = function () {
            if (xhr.readyState == 4 && xhr.status == 200) {
                let result = JSON.parse(xhr.responseText);
                if (result.code == 200) {
                    top.showMessage("加载完成");
                    console.log(result.data);
                    let now_data = result.data[0];
                    let shuchu = `
                        <tr>
                            <td>ID</td>
                            <td>${now_data.id}</td>
                        </tr>
                        <tr>
                            <td>title</td>
                            <td>${now_data.title}</td>
                        </tr>
                        <tr>
                            <td>抽奖时间</td>
                            <td>${now_data.time}</td>
                        </tr>
                        <tr>
                            <td>抽奖个数</td>
                            <td>${now_data.num}</td>
                        </tr>
                        <tr>
                            <td>是否完成抽奖</td>
                            <td>${now_data.y_n}</td>
                        </tr>
                    `;
                    document.getElementById("insert").innerHTML = shuchu;
                    document.getElementById("huodong").style.display = "block";
                    document.getElementById("no-activity").style.display = "none";
                    document.getElementById("create").style.display = "none";
                } else if (result.code == 201) {
                    top.showMessage("今日无活动");
                } else {
                    top.showMessage("加载失败");
                }
            }
        };
        xhr.send("token=" + getToken() + "&date=" + today);
    }

    function init() {
        loadInit();
    }
    // 页面加载完成初始化
    document.addEventListener("DOMContentLoaded", function () { init() })
</script>

</html>
