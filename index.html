<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>快递取件快捷记录系统</title>
    <script src="./js/lib.js"></script>
    <link rel="stylesheet" href="./css/all.main.css">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/message-box.css">
    <link rel="stylesheet" href="./css/confirm-dialog.css">
    <link rel="stylesheet" href="./css/radioList.css">
    <script src="./js/showMessage.js"></script>
    <script src="./js/darkreader.min.js"></script>
    <script src="./js/xlsx.full.min.js.js"></script>
    <script>
        //本地检查登录状态
        if (!checkLoginToken()) {
            window.location.href = "login.html";
        } else {
            //服务器检查登录状态
            checkLoginTokenIsTrue();
        }
    </script>
</head>

<body>
    <div class="container">

        <div class="statistics">
            <div class="stat-card">
                <div class="stat-icon total" ondblclick="loginOut()">
                    <i class="fas fa-boxes"></i>
                </div>
                <div class="stat-info" ondblclick="window.location.href='./search'">
                    <h3 id="todayNum">xx</h3>
                    <p>今天总快递量</p>
                    <p>这个月送了<span style="font-weight: bold;color: #000;" id="monthNum">xx</span> 个快递</p>
                </div>
            </div>
        </div>

        <div class="tabs">
            <div class="tab active" data-tab="deliver" onclick="song()">送快递</div>
            <div class="tab" data-tab="pick" onclick="qu()">取快递</div>
            <div class="tab" data-tab="edit">修改记录</div>
        </div>

        <div class="filters">
            <div class="date-filter">
                <label for="date-select" style="user-select: none;"><i class="fas fa-calendar-alt"></i> 选择日期：</label>
                <input type="date" id="date-select">
            </div>
            <div class="action-buttons" id="action-buttons" style="display: none;">
                <button class="btn btn-success" id="add-record">
                    <i class="fas fa-plus"></i> 新增记录
                </button>
                <button class="btn btn-primary" onclick="exportData()">
                    <i class="fas fa-download"></i> 导出数据
                </button>
            </div>
        </div>

        <div class="content">
            <table id="records-table">
                <thead>
                    <tr>
                        <th>状态</th>
                        <!-- <th>编号</th> -->
                        <th onclick="selectData('2')">↓</th>
                        <!-- <th>栋</th> -->
                        <th>宿舍</th>
                        <th>取件码</th>
                        <th>尾号</th>
                        <th>备注</th>
                        <th ondblclick="setToday('today')">更新时间</th>
                        <th class="actions-header" style="display: none;">操作</th>
                    </tr>
                </thead>

                <tbody>
                    <!-- 数据将通过JS动态填充 -->
                </tbody>
            </table>
        </div>

        <footer>
            <p>© 2025 快递取件快捷记录系统 | 设计：LiHuarong@gitea.lihuarong.cn:8080</p>
        </footer>
    </div>

    <!-- 新增记录弹窗 -->
    <div class="modal" id="add-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-plus-circle"></i> 新增快递记录</h2>
                <button class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="building-add">栋</label>
                    <div id="building-add">
                        <!-- <select id="building-add"></select> -->
                    </div>

                </div>
                <div class="form-group">
                    <label for="room-add">宿舍号</label>
                    <input type="number" id="room-add" placeholder="例如：101">
                </div>
                <!-- 在原有取件码和快递尾号位置替换为以下代码 -->
                <div class="form-group">
                    <label>快递包裹信息</label>


                    <div id="express-groups-container">
                        <div class="express-group" style="
                            border: 1px solid #ddd;
                            border-radius: 6px;
                            padding: 10px;
                            margin-bottom: 10px;
                            background: #f9f9f9;
                        ">
                            <div style="display: flex; justify-content: space-between;      margin-bottom: 8px;">
                                <span style="font-weight: bold; color: #3498db;">包裹 #1</span>
                                <button class="remove-group-btn" disabled style="
                                    background: #e74c3c;
                                    color: white;
                                    border: none;
                                    border-radius: 50%;
                                    width: 24px;
                                    height: 24px;
                                    cursor: pointer;
                                ">
                                    <i class="fas fa-times"></i>
                                </button>
                            </div>
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                                <div class="form-group" style="margin-bottom: 0;">
                                    <label>取件码</label>
                                    <input type="text" placeholder="例如：A1234" name="pickup-code">
                                </div>
                                <div class="form-group" style="margin-bottom: 0;">
                                    <label>快递尾号</label>
                                    <input type="number" placeholder="例如：5678" name="express-number">
                                </div>
                            </div>
                        </div>
                    </div>
                    <button type="button" id="add-group-btn" style="
                        background: #3498db;
                        color: white;
                        border: none;
                        border-radius: 4px;
                        padding: 6px 12px;
                        margin-bottom: 10px;
                        cursor: pointer;
                    ">
                        <i class="fas fa-plus"></i> 添加
                    </button>
                </div>

                <div class="form-group">
                    <label for="pickup-time-add">时间</label>
                    <!-- 默认今天 -->
                    <input type="date" name="time" id="pickup-time-add">
                </div>
                <div class="form-group">
                    <label for="notes-add">备注信息</label>
                    <textarea id="notes-add" placeholder="可输入特殊要求或其他信息"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-danger" id="cancel-add-btn">取消</button>
                <button class="btn btn-success" id="save-add-btn" onclick="addRecord()">保存记录</button>
            </div>
        </div>
    </div>

    <!-- 修改记录弹窗 -->
    <div class="modal" id="edit-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-edit"></i> 修改快递记录</h2>
                <button class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="id-edit">编号</label>
                    <input type="text" id="id-edit" class="readonly" readonly>
                </div>
                <div class="form-group">
                    <label for="building-edit">栋</label>
                    <select id="building-edit">
                    </select>
                </div>
                <div class="form-group">
                    <label for="room-edit">宿舍号</label>
                    <input type="text" id="room-edit" placeholder="例如：101">
                </div>
                <div class="form-group">
                    <label for="pickup-code-edit">取件码</label>
                    <input type="text" id="pickup-code-edit" placeholder="例如：A1234">
                </div>
                <div class="form-group">
                    <label for="express-number-edit">快递尾号</label>
                    <input type="text" id="express-number-edit" placeholder="例如：5678">
                </div>
                <div class="form-group">
                    <label for="pickup-time-edit">时间</label>
                    <input type="date" name="time" id="pickup-time-edit">
                </div>
                <div class="form-group">
                    <label for="notes-edit">备注信息</label>
                    <textarea id="notes-edit" placeholder="可输入特殊要求或其他信息"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-danger" id="cancel-edit-btn">取消</button>
                <button class="btn btn-success" id="save-edit-btn">保存修改</button>
            </div>
        </div>
    </div>
    <!-- 确认弹窗结构 -->
    <div class="confirm-overlay" id="confirmOverlay">
        <div class="confirm-dialog">
            <div class="confirm-header">
                <h2 id="confirmTitle">确认删除数据吗？</h2>
            </div>
            <div class="confirm-body">
                <p id="confirmMessage">删除后数据将无法恢复，请谨慎操作！</p>
            </div>
            <div class="confirm-footer">
                <button class="btn-cancel" id="confirmCancel">取消</button>
                <button class="btn-confirm" id="confirmOk">确认</button>
            </div>
        </div>
    </div>
    <script src="./js/radioList.js"></script>
    <script src="./js/loadLightDarkInit.js"></script>
    <script src="./js/script.js"></script>
    <script src="./js/confirm-dialog.js"></script>
</body>

</html>
