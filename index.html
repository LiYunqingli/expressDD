    <script>
        // 当type=0的时候是监听器调用查询记录，当type!=0的时候是增加了记录后自动查询且自动选择
        function searchAllRoomUserWeChatName(type = 0, str = "", operate = "add") {
            let building_str = document.querySelector("#building-" + operate + " select").value;
            let room_str = document.querySelector("#room-" + operate).value;
            if (building_str == "null" || room_str == null || room_str == "") {
                top.showMessage("请选择栋和宿舍号", 3000, 'red');
                return;
            }
            const kehu_add_p = document.getElementById("kehu-" + operate + "-p");
            const kehu_add_loading = document.getElementById("kehu-" + operate + "-loading");
            const kehu_add_select = document.getElementById("kehu-" + operate);
            const kehu_add_p_err = document.getElementById("kehu-" + operate + "-p-err");
            console.log("kehu-" + operate + "-p-err")

            kehu_add_p.style.display = "none";
            kehu_add_loading.style.display = "none";
            kehu_add_p_err.style.display = "none";
            kehu_add_loading.style.display = "block";
            let xhr = new XMLHttpRequest();
            xhr.open('POST', $HOST + "/searchWeChatName.php", true);
            xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    let result = JSON.parse(xhr.responseText);
                    if (result.code == 200) {
                        console.log(result.data);
                        top.showMessage(result.msg);
                        let shuchu = `<option value="">请选择</option>`;
                        if (type == 0) {
                            for (let i = 0; i < result.data.length; i++) {
                                let now_data = result.data[i];
                                shuchu += `
                                    <option value="${now_data.id}">${now_data.wechat_name}</option>
                                `;
                            }
                        } else {
                            for (let i = 0; i < result.data.length; i++) {
                                let now_data = result.data[i];
                                // 如果now_data.wechat_name == str，则select中选中该项
                                if (now_data.wechat_name == str) {
                                    shuchu += `
                                        <option value="${now_data.id}" selected>${now_data.wechat_name}</option>
                                    `;
                                } else {
                                    shuchu += `
                                        <option value="${now_data.id}">${now_data.wechat_name}</option>
                                    `;
                                }
                            }
                        }
                        kehu_add_select.innerHTML = shuchu;
                        kehu_add_loading.style.display = "none";
                        kehu_add_p_err.style.display = "none";
                        kehu_add_p.style.display = "none";
                        kehu_add_select.style.display = "block";
                    } else {
                        top.showMessage(result.msg, 3000, 'red');
                        kehu_add_p.style.display = "none";
                        kehu_add_select.style.display = "none";
                        kehu_add_loading.style.display = "none";
                        kehu_add_p_err.style.display = "block";
                    }
                }
            };
            xhr.send(`token=${getToken()}&building=${building_str}&room=${room_str}`);
        }

        function addKeHu(type = "add") {
            let building_add = document.querySelector("#building-" + type + " select").value;
            let room = document.getElementById("room-" + type).value;
            if (building_add == "null" || room == "") {
                top.showMessage("请选择楼栋和输入房号", 3000, 'red');
                return;
            }
            let kehuInput = prompt("为'" + building_add + "-" + room + "'增加客户微信", "");
            if (kehuInput != null) {
                let xhr = new XMLHttpRequest();
                xhr.open("POST", $HOST + "/addWeChatName.php", true);
                xhr.setRequestHeader("Content-Type", "application/x-www-form-urlencoded");
                xhr.onreadystatechange = function () {
                    if (xhr.readyState == 4 && xhr.status == 200) {
                        let result = JSON.parse(xhr.responseText);
                        if (result.code == 200) {
                            top.showMessage(result.msg);
                            searchAllRoomUserWeChatName(1, kehuInput, type);
                        } else {
                            top.showMessage(result.msg, 3000, 'red');
                        }
                    }
                };
                xhr.send(`token=${getToken()}&building=${building_add}&room=${room}&weChatName=${kehuInput}`);
            } else {
                console.log("取消增加客户微信");
            }
        }

        // 检查微信选择是否选了（增加数据不允许）
        function checkKeHuisSelect(type = "add") {
            let kehuSelect = document.getElementById("kehu-" + type);
            if (kehuSelect.style.display == "none") {
                return false;
            } else if (kehuSelect.value == "" || kehuSelect.value == null) {
                return false;
            } else {
                return true;
            }
        }

        function clearFormKeHuAdd(type = "add") {
            const kehu_add_p = document.getElementById("kehu-" + type + "-p");
            const kehu_add_loading = document.getElementById("kehu-" + type + "-loading");
            const kehu_add_select = document.getElementById("kehu-" + type);
            const kehu_add_p_err = document.getElementById("kehu-" + type + "-p-err");


            kehu_add_p.style.display = "block";
            kehu_add_loading.style.display = "none";
            kehu_add_select.style.display = "none";
            kehu_add_p_err.style.display = "none";
            kehu_add_select.innerHTML = `<option value="">请选择</option>`;
        }

    </script>

                    onclick="document.getElementById('uploadImageInput').click();">修改</button>
                <button class="btn btn-primary" id="copy-link-btn">复制链接</button>
            </div>
        </div>
    </div>

    <!-- 备注图片预览弹窗 -->
    <div class="modal" id="notes-img-modal" onclick="closeNotesImage()">
        <div class="modal-content notes-img-modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2>备注图片</h2>
                <button class="close-btn" onclick="closeNotesImage()">&times;</button>
            </div>
            <div class="modal-body">
                <img id="notes-img-modal-img" src="" alt="备注图片" class="notes-img-modal-img">
            </div>
        </div>
    </div>

    <input type="file" accept="image/*" style="display: none;" id="uploadImageInput">
    <script src="./js/loadLightDarkInit.js"></script>
    <script src="./js/script.js"></script>
    <script src="./js/confirm-dialog.js"></script>
</body>

</html>
