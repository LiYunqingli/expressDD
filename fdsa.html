<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>前端图片压缩工具</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background-color: #f5f7fa;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            padding: 30px;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
        }
        
        .description {
            color: #7f8c8d;
            max-width: 800px;
            margin: 0 auto;
        }
        
        .upload-area {
            border: 2px dashed #3498db;
            border-radius: 8px;
            padding: 40px 20px;
            text-align: center;
            margin-bottom: 30px;
            background-color: #f8fafc;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .upload-area:hover {
            background-color: #e8f4ff;
            border-color: #2980b9;
        }
        
        .upload-area p {
            margin: 10px 0;
            color: #7f8c8d;
        }
        
        .upload-icon {
            font-size: 50px;
            color: #3498db;
            margin-bottom: 15px;
        }
        
        #file-input {
            display: none;
        }
        
        .compress-controls {
            background: #f8fafc;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }
        
        .control-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2c3e50;
        }
        
        input[type="range"] {
            width: 100%;
            margin-bottom: 10px;
        }
        
        .value-display {
            display: flex;
            justify-content: space-between;
            color: #7f8c8d;
            font-size: 14px;
        }
        
        .button {
            background: #3498db;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: background 0.3s;
            display: inline-block;
            margin-right: 10px;
        }
        
        .button:hover {
            background: #2980b9;
        }
        
        .button-secondary {
            background: #2ecc71;
        }
        
        .button-secondary:hover {
            background: #27ae60;
        }
        
        .results {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .result-card {
            flex: 1;
            min-width: 300px;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
        }
        
        .result-header {
            background: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: 600;
        }
        
        .result-body {
            padding: 15px;
            text-align: center;
        }
        
        .image-preview {
            max-width: 100%;
            max-height: 300px;
            margin-bottom: 15px;
            border-radius: 4px;
        }
        
        .image-info {
            color: #7f8c8d;
            font-size: 14px;
        }
        
        .comparison {
            background: #f8fafc;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
        }
        
        .size-reduction {
            font-weight: 600;
            color: #2c3e50;
            margin-top: 10px;
            padding: 10px;
            background: #e8f4ff;
            border-radius: 6px;
            text-align: center;
        }
        
        .success {
            color: #27ae60;
        }
        
        .warning {
            color: #e74c3c;
        }
        
        .hidden {
            display: none;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
        }
        
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            border-left: 4px solid #3498db;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        footer {
            text-align: center;
            margin-top: 30px;
            color: #7f8c8d;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>前端图片压缩工具</h1>
            <p class="description">使用纯前端技术实现图片压缩，无需上传服务器，保护您的隐私。支持将2-5MB的图片压缩到几百KB，同时保持可接受的视觉质量。</p>
        </header>
        
        <div class="upload-area" id="upload-area">
            <div class="upload-icon">📁</div>
            <h3>拖放图片到这里或点击上传</h3>
            <p>支持JPG、PNG格式，最大10MB</p>
            <input type="file" id="file-input" accept="image/jpeg,image/png">
        </div>
        
        <div class="compress-controls hidden" id="compress-controls">
            <div class="control-group">
                <label for="quality">压缩质量</label>
                <input type="range" id="quality" min="40" max="100" value="80">
                <div class="value-display">
                    <span>较低质量</span>
                    <span id="quality-value">80%</span>
                    <span>较高质量</span>
                </div>
            </div>
            
            <div class="control-group">
                <label for="max-width">最大宽度（保持宽高比）</label>
                <input type="range" id="max-width" min="800" max="4000" step="100" value="2000">
                <div class="value-display">
                    <span>较小尺寸</span>
                    <span id="max-width-value">2000px</span>
                    <span>原始尺寸</span>
                </div>
            </div>
            
            <button class="button" id="compress-btn">压缩图片</button>
            <button class="button button-secondary" id="download-btn" disabled>下载压缩图片</button>
        </div>
        
        <div class="loading hidden" id="loading">
            <div class="spinner"></div>
            <p>正在压缩图片，请稍候...</p>
        </div>
        
        <div class="results hidden" id="results">
            <div class="result-card">
                <div class="result-header">原始图片</div>
                <div class="result-body">
                    <img id="original-preview" class="image-preview">
                    <div class="image-info" id="original-info"></div>
                </div>
            </div>
            
            <div class="result-card">
                <div class="result-header">压缩后图片</div>
                <div class="result-body">
                    <img id="compressed-preview" class="image-preview">
                    <div class="image-info" id="compressed-info"></div>
                </div>
            </div>
            
            <div class="comparison">
                <h3>压缩效果对比</h3>
                <div class="size-reduction" id="size-reduction"></div>
            </div>
        </div>
    </div>
    
    <footer>
        <p>本工具使用纯前端JavaScript实现，图片不会上传到服务器，确保您的隐私安全。</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const fileInput = document.getElementById('file-input');
            const uploadArea = document.getElementById('upload-area');
            const compressControls = document.getElementById('compress-controls');
            const loading = document.getElementById('loading');
            const results = document.getElementById('results');
            const qualitySlider = document.getElementById('quality');
            const maxWidthSlider = document.getElementById('max-width');
            const qualityValue = document.getElementById('quality-value');
            const maxWidthValue = document.getElementById('max-width-value');
            const compressBtn = document.getElementById('compress-btn');
            const downloadBtn = document.getElementById('download-btn');
            const originalPreview = document.getElementById('original-preview');
            const compressedPreview = document.getElementById('compressed-preview');
            const originalInfo = document.getElementById('original-info');
            const compressedInfo = document.getElementById('compressed-info');
            const sizeReduction = document.getElementById('size-reduction');
            
            let originalImage = null;
            let compressedImageBlob = null;
            
            // 更新滑块值显示
            qualitySlider.addEventListener('input', () => {
                qualityValue.textContent = `${qualitySlider.value}%`;
            });
            
            maxWidthSlider.addEventListener('input', () => {
                maxWidthValue.textContent = `${maxWidthSlider.value}px`;
            });
            
            // 上传区域点击事件
            uploadArea.addEventListener('click', () => {
                fileInput.click();
            });
            
            // 拖放功能
            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.style.backgroundColor = '#e8f4ff';
                uploadArea.style.borderColor = '#2980b9';
            });
            
            uploadArea.addEventListener('dragleave', () => {
                uploadArea.style.backgroundColor = '#f8fafc';
                uploadArea.style.borderColor = '#3498db';
            });
            
            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.style.backgroundColor = '#f8fafc';
                uploadArea.style.borderColor = '#3498db';
                
                if (e.dataTransfer.files.length) {
                    handleImageUpload(e.dataTransfer.files[0]);
                }
            });
            
            // 文件选择事件
            fileInput.addEventListener('change', () => {
                if (fileInput.files.length) {
                    handleImageUpload(fileInput.files[0]);
                }
            });
            
            // 压缩按钮点击事件
            compressBtn.addEventListener('click', compressImage);
            
            // 下载按钮点击事件
            downloadBtn.addEventListener('click', () => {
                if (compressedImageBlob) {
                    const url = URL.createObjectURL(compressedImageBlob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'compressed-image.jpg';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                }
            });
            
            // 处理图片上传
            function handleImageUpload(file) {
                if (!file.type.match('image/jpeg') && !file.type.match('image/png')) {
                    alert('请上传JPG或PNG格式的图片！');
                    return;
                }
                
                if (file.size > 10 * 1024 * 1024) {
                    alert('图片大小不能超过10MB！');
                    return;
                }
                
                const reader = new FileReader();
                reader.onload = function(e) {
                    originalImage = new Image();
                    originalImage.onload = function() {
                        // 显示原始图片信息
                        originalPreview.src = e.target.result;
                        originalInfo.textContent = `尺寸: ${originalImage.width} × ${originalImage.height} | 大小: ${formatFileSize(file.size)}`;
                        
                        // 显示压缩控制面板
                        compressControls.classList.remove('hidden');
                        results.classList.add('hidden');
                    };
                    originalImage.src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
            
            // 压缩图片
            function compressImage() {
                if (!originalImage) return;
                
                // 显示加载中
                loading.classList.remove('hidden');
                results.classList.add('hidden');
                compressBtn.disabled = true;
                
                // 使用setTimeout让UI有机会更新
                setTimeout(() => {
                    const quality = parseInt(qualitySlider.value) / 100;
                    const maxWidth = parseInt(maxWidthSlider.value);
                    
                    // 计算新尺寸（保持宽高比）
                    let newWidth = originalImage.width;
                    let newHeight = originalImage.height;
                    
                    if (originalImage.width > maxWidth) {
                        newWidth = maxWidth;
                        newHeight = (originalImage.height * maxWidth) / originalImage.width;
                    }
                    
                    // 创建Canvas进行压缩
                    const canvas = document.createElement('canvas');
                    canvas.width = newWidth;
                    canvas.height = newHeight;
                    
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(originalImage, 0, 0, newWidth, newHeight);
                    
                    // 获取压缩后的图片数据
                    canvas.toBlob(
                        function(blob) {
                            compressedImageBlob = blob;
                            
                            // 显示压缩后的图片
                            const url = URL.createObjectURL(blob);
                            compressedPreview.src = url;
                            compressedInfo.textContent = `尺寸: ${newWidth} × ${newHeight} | 大小: ${formatFileSize(blob.size)}`;
                            
                            // 计算压缩率
                            const originalSize = getBase64ImageSize(originalImage.src);
                            const compressionRatio = (1 - (blob.size / originalSize)) * 100;
                            
                            let reductionText = '';
                            if (compressionRatio > 0) {
                                reductionText = `压缩成功！大小减少了 <span class="success">${compressionRatio.toFixed(1)}%</span>`;
                            } else {
                                reductionText = `压缩后大小增加了 <span class="warning">${Math.abs(compressionRatio).toFixed(1)}%</span>，请尝试降低质量设置`;
                            }
                            
                            sizeReduction.innerHTML = reductionText;
                            
                            // 显示结果
                            loading.classList.add('hidden');
                            results.classList.remove('hidden');
                            compressBtn.disabled = false;
                            downloadBtn.disabled = false;
                            
                            // 释放URL对象
                            setTimeout(() => URL.revokeObjectURL(url), 100);
                        },
                        'image/jpeg',
                        quality
                    );
                }, 100);
            }
            
            // 辅助函数：格式化文件大小
            function formatFileSize(bytes) {
                if (bytes < 1024) {
                    return bytes + ' B';
                } else if (bytes < 1024 * 1024) {
                    return (bytes / 1024).toFixed(2) + ' KB';
                } else {
                    return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
                }
            }
            
            // 辅助函数：估算Base64图片大小（字节）
            function getBase64ImageSize(base64String) {
                // 移除Base64前缀
                const base64 = base64String.split(',')[1];
                
                // 计算Base64字符串大小（约比二进制大33%）
                const stringLength = base64.length;
                const sizeInBytes = 4 * Math.ceil((stringLength / 3)) * 0.5624896334383812;
                return sizeInBytes;
            }
        });
    </script>
</body>
</html>
